<!DOCTYPE html>
<html>
<head>
<title>My Leaflet Map</title>
<meta charset="utf-8" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
height: 600px;
}
</style>
</head>

<body>

<h2>My Map</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([32.2, -80.75], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

L.marker([32.2, -80.75]).addTo(map)
.bindPopup('Hello from my map!')
.openPopup();
</script>

</body>
</html>
